<!DOCTYPE html>
<html>
<head>
<title>Tournament Roadmap</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  color:white;
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(70,0,0,.75),rgba(10,0,0,.95)),
    url("Screenshot 2026-06-20 133208.png");
  background-size:cover;
  background-attachment:fixed;
  background-position:center;
}

header{
  text-align:center;
  padding:25px;
  background:linear-gradient(90deg,#4b0000,#b30000,#4b0000);
  border-bottom:2px solid #ff2a2a;
}

header h1{
  margin:0;
  font-size:36px;
  letter-spacing:2px;
  color:#fff;
  text-shadow:0 0 12px red;
}

header p{
  margin-top:8px;
  color:#ffd0d0;
}

.container{
  padding:18px;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
}

.card{
  background:rgba(25,0,0,.88);
  border:1px solid #ff2a2a;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 18px rgba(255,0,0,.35);
}

.card h2{
  margin:0;
  padding:11px;
  text-align:center;
  background:linear-gradient(90deg,#ff0000,#7a0000);
  color:white;
  font-size:18px;
  letter-spacing:1px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  padding:8px;
  background:#220000;
  color:#ffb3b3;
  font-size:13px;
}

td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,.12);
  font-size:13px;
}

td:first-child{
  text-align:center;
  color:#ff4d4d;
  font-weight:bold;
}

.empty{
  color:#777;
}

@media(max-width:1400px){
  .container{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:800px){
  .container{grid-template-columns:repeat(1,1fr);}
}
</style>
</head>

<body>

<header>
  <h1>The Shield Showdown Group Division</h1>
  <p>37 Groups - 12 Teams Per Group</p>
</header>

<div class="container" id="groups"></div>

<script>
async function loadGroups(){
  const res = await fetch("/groups");
  const groups = await res.json();
  const box = document.getElementById("groups");

  box.innerHTML = "";

  groups.forEach(group => {
    let rows = "";

    for(let i = 0; i < 12; i++){
      rows += `
        <tr>
          <td>${String(i + 1).padStart(2,"0")}</td>
          <td class="${group.teams[i] ? "" : "empty"}">
            ${group.teams[i] || "Empty Slot"}
          </td>
        </tr>
      `;
    }

    box.innerHTML += `
      <div class="card">
        <h2>${group.name}</h2>
        <table>
          <tr><th>Slot</th><th>Team</th></tr>
          ${rows}
        </table>
      </div>
    `;
  });
}

loadGroups();
setInterval(loadGroups, 30000);
</script>

</body>
</html>
