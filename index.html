<!DOCTYPE html>
<html>
<head>
<title>The Shield Showdown - Groups</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  color:white;
  font-family:Arial,sans-serif;
  background:
  linear-gradient(rgba(70,0,0,.75),rgba(10,0,0,.95)),
  url("Screenshot 2026-06-20 133208.png");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* NAVBAR */

.navbar{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  padding:15px;
  background:#120000;
  border-bottom:2px solid #ff2a2a;
  position:sticky;
  top:0;
  z-index:999;
}

.navbar a{
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,#ff0000,#7a0000);
  padding:12px 20px;
  border-radius:10px;
  font-weight:bold;
  border:1px solid #ff4444;
  transition:.3s;
}

.navbar a:hover{
  transform:translateY(-2px);
  box-shadow:0 0 18px rgba(255,0,0,.8);
}

/* HEADER */

header{
  text-align:center;
  padding:25px;
  background:linear-gradient(90deg,#4b0000,#b30000,#4b0000);
  border-bottom:2px solid #ff2a2a;
}

header h1{
  margin:0;
  font-size:38px;
  color:white;
  text-shadow:0 0 12px red;
}

header p{
  margin-top:8px;
  color:#ffd0d0;
}

.stats{
  margin-top:15px;
  font-size:18px;
  color:#ffb3b3;
}

.refresh{
  margin-top:15px;
  padding:10px 20px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* GROUP GRID */

.container{
  padding:18px;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
}

.card{
  background:rgba(25,0,0,.88);
  border:1px solid #ff2a2a;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 18px rgba(255,0,0,.35);
}

.card h2{
  margin:0;
  padding:11px;
  text-align:center;
  background:linear-gradient(90deg,#ff0000,#7a0000);
  color:white;
  font-size:18px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  padding:8px;
  background:#220000;
  color:#ffb3b3;
  font-size:13px;
}

td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,.12);
  font-size:13px;
}

td:first-child{
  width:50px;
  text-align:center;
  color:#ff4444;
  font-weight:bold;
}

.empty{
  color:#777;
}

/* MOBILE */

@media(max-width:1400px){
  .container{
    grid-template-columns:repeat(3,1fr);
  }
}

@media(max-width:800px){
  .container{
    grid-template-columns:1fr;
  }

  header h1{
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/roadmap.html">🗺️ Roadmap</a>
  <a href="/schedule.html">🗓️ Schedule</a>
  <a href="/support.html">🛠️ Support</a>

</div>

<header>
  <h1>THE SHIELD SHOWDOWN</h1>
  <p>Official Group Division</p>

  <div class="stats">
    Total Groups: <span id="groupCount">0</span>
  </div>
</header>

<div class="container" id="groups">
Loading Groups...
</div>

<script>

async function loadGroups(){

  try{

    const res = await fetch("/groups");
    const groups = await res.json();

    document.getElementById("groupCount").innerText = groups.length;

    const box = document.getElementById("groups");
    box.innerHTML = "";

    groups.forEach(group => {

      let rows = "";

      for(let i=0;i<12;i++){

        rows += `
        <tr>
          <td>${String(i+1).padStart(2,"0")}</td>
          <td class="${group.teams[i] ? "" : "empty"}">
            ${group.teams[i] || "Empty Slot"}
          </td>
        </tr>`;
      }

      box.innerHTML += `
      <div class="card">
        <h2>${group.name}</h2>

        <table>
          <tr>
            <th>Slot</th>
            <th>Team Name</th>
          </tr>

          ${rows}
        </table>

      </div>`;
    });

  }catch(err){

    document.getElementById("groups").innerHTML =
    "<h2>Cannot load groups. Server offline.</h2>";

  }
}

loadGroups();

setInterval(loadGroups,30000);

</script>

</body>
</html>
