<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Room Sender</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#080000,#300000,#080000);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:430px;
  background:#160000;
  border:2px solid #ff2525;
  border-radius:16px;
  padding:25px;
  box-shadow:0 0 25px rgba(255,0,0,.45);
}

h2{
  text-align:center;
  color:#ff4444;
  margin-bottom:20px;
}

label{
  font-size:14px;
  color:#ffb3b3;
  margin-top:12px;
  display:block;
}

input,select,button{
  width:100%;
  padding:13px;
  margin-top:7px;
  border:none;
  border-radius:8px;
  font-size:15px;
}

input,select{
  background:#2b0000;
  color:white;
  outline:1px solid #600;
}

button{
  margin-top:18px;
  background:#ff0000;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.delete-btn{
  background:#3a0000;
  border:1px solid #ff4444;
}

.delete-btn:hover{
  background:#6b0000;
}

#msg{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎮 Admin Room Sender</h2>

  <label>Admin Key</label>
  <input id="key" type="password" placeholder="Enter admin key">

  <label>Select Group</label>
  <select id="group"></select>

  <label>Room ID</label>
  <input id="roomId" placeholder="Enter room ID">

  <label>Password</label>
  <input id="password" placeholder="Enter password">

  <button onclick="sendRoom()">SEND ROOM DETAILS</button>

<hr style="margin:25px 0;border:1px solid #550000;">

<h2>📅 Schedule Upload</h2>

<label>Select Schedule Image</label>
<input
  type="file"
  id="scheduleImage"
  accept="image/png,image/jpeg,image/webp">

<button onclick="uploadSchedule()">
  UPLOAD SCHEDULE
</button>

<button class="delete-btn" onclick="deleteSchedule()">
  DELETE SCHEDULE
</button>

<p id="msg"></p>
</div>

<script>
const API_BASE = ["5500", "5501"].includes(window.location.port)
  ? "http://localhost:3000"
  : "";

const groupSelect = document.getElementById("group");

async function readJsonResponse(res){
  const text = await res.text();

  if(!text){
    return {};
  }

  try{
    return JSON.parse(text);
  }catch(error){
    return {
      error: text
    };
  }
}

for(let i = 1; i <= 40; i++){
  const option = document.createElement("option");
  option.value = i;
  option.textContent = "Group " + i;
  groupSelect.appendChild(option);
}

async function sendRoom(){
  const msg = document.getElementById("msg");

  const adminKey = document.getElementById("key").value.trim();
  const group = document.getElementById("group").value;
  const roomId = document.getElementById("roomId").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!adminKey || !roomId || !password){
    msg.style.color = "#ff4444";
    msg.innerText = "Please fill all fields.";
    return;
  }

  msg.style.color = "#ffd700";
  msg.innerText = "Sending...";

  try{
    const res = await fetch(`${API_BASE}/send-room`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        adminKey,
        group,
        roomId,
        password
      })
    });

    const data = await readJsonResponse(res);

    if(res.ok){
      msg.style.color = "#00ff66";
      msg.innerText = data.message || "Room sent successfully.";

      document.getElementById("roomId").value = "";
      document.getElementById("password").value = "";
    }else{
      msg.style.color = "#ff4444";
      msg.innerText = data.error || "Failed to send.";
    }

  }catch(error){
    msg.style.color = "#ff4444";
    msg.innerText = "Server connection error.";
  }
}

async function uploadSchedule(){
  const msg = document.getElementById("msg");
  const adminKey = document.getElementById("key").value.trim();
  const file = document.getElementById("scheduleImage").files[0];

  if(!adminKey){
    msg.style.color = "#ff4444";
    msg.innerText = "Please enter Admin Key.";
    return;
  }

  if(!file){
    msg.style.color = "#ff4444";
    msg.innerText = "Please select a schedule image.";
    return;
  }

  const formData = new FormData();
  formData.append("adminKey", adminKey);
  formData.append("schedule", file);

  msg.style.color = "#ffd700";
  msg.innerText = "Uploading...";

  try{
    const res = await fetch(`${API_BASE}/upload-schedule`, {
      method:"POST",
      body:formData
    });

    const data = await readJsonResponse(res);

    if(res.ok){
      msg.style.color = "#00ff66";
      msg.innerText = data.message || "Schedule uploaded successfully.";
      document.getElementById("scheduleImage").value = "";
    }else{
      msg.style.color = "#ff4444";
      msg.innerText = data.error || "Upload failed.";
    }

  }catch(error){
    console.error(error);
    msg.style.color = "#ff4444";
    msg.innerText = "Upload failed.";
  }
}

async function deleteSchedule(){
  const msg = document.getElementById("msg");
  const adminKey = document.getElementById("key").value.trim();

  if(!adminKey){
    msg.style.color = "#ff4444";
    msg.innerText = "Please enter Admin Key.";
    return;
  }

  if(!confirm("Delete the uploaded schedule?")){
    return;
  }

  msg.style.color = "#ffd700";
  msg.innerText = "Deleting...";

  try{
    const res = await fetch(`${API_BASE}/delete-schedule`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({ adminKey })
    });

    const data = await readJsonResponse(res);

    if(res.ok){
      msg.style.color = "#00ff66";
      msg.innerText = data.message || "Schedule deleted successfully.";
      document.getElementById("scheduleImage").value = "";
    }else{
      msg.style.color = "#ff4444";
      msg.innerText = data.error || "Delete failed.";
    }

  }catch(error){
    console.error(error);
    msg.style.color = "#ff4444";
    msg.innerText = "Delete failed.";
  }
}
</script>

</body>
</html>
