<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#050505,#2b0000,#050505);
    color:#fff;
}

.container{
    width:90%;
    max-width:550px;
    text-align:center;
    background:#120000;
    border:2px solid #ff1e1e;
    border-radius:15px;
    padding:40px 30px;
    box-shadow:0 0 25px rgba(255,0,0,.5);
}

.icon{
    font-size:80px;
    margin-bottom:20px;
}

h1{
    color:#ff3b3b;
    font-size:32px;
    margin-bottom:15px;
}

p{
    color:#cccccc;
    font-size:18px;
    line-height:1.7;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:14px 35px;
    background:#ff0000;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#cc0000;
}

.footer{
    margin-top:30px;
    color:#888;
    font-size:14px;
}

</style>

</head>
<body>

<div class="container">

<div class="icon">🛠️</div>

<h1>THIS PAGE IS UNDER DEVELOPMENT</h1>

<p>
Our Support Center is currently being developed.<br><br>
We're working hard to provide a better support experience.
Please check back soon.
</p>

<a href="/" class="btn">🏠 Back to Home</a>

</div>

</body>
</html>
